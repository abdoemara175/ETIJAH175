<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتجاه - نظام التحكم السلوكي</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">اتجاه</h1>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- State Badge -->
            <div class="state-card">
                <span class="state-label">عامل اي دلوقتي:</span>
                <div class="state-buttons">
                    <button class="btn btn-state" data-state="focused">💯 مركز</button>
                    <button class="btn btn-state" data-state="distracted">😅 مشتت</button>
                    <button class="btn btn-state" data-state="idle">😴 خامل</button>
                    <button class="btn btn-state" data-state="stressed">😨 إجهاد</button>
                </div>
            </div>

            <!-- Primary Action -->
            <div class="action-card">
                <button id="generateBtn" class="btn btn-primary">
                    <span class="btn-text">يلا بينا</span>
                    <span class="btn-icon">→</span>
                </button>
            </div>

            <!-- Output Display -->
            <div id="output" class="output-card">
                <div class="output-placeholder">
                    <p>اضغط "يلا بينا" لبدء</p>
                </div>
            </div>

            <!-- Progress Bar -->
            <div class="progress-container" id="progressContainer" style="display: none;">
                <div class="progress-bar-bg">
                    <div id="progressBar" class="progress-bar-fill"></div>
                </div>
            </div>

            <!-- Confirmation Buttons -->
            <div class="confirmation-section" id="confirmSection">
                <button id="acceptBtn" class="btn btn-confirm btn-accept">
                    <span>✓</span>
                    <span>قبول</span>
                </button>
                <button id="doneBtn" class="btn btn-confirm btn-done">
                    <span>✓</span>
                    <span>تم</span>
                </button>
                <button id="skipBtn" class="btn btn-confirm btn-skip">
                    <span>⊘</span>
                    <span>تخطي</span>
                </button>
                <button id="failBtn" class="btn btn-confirm btn-fail">
                    <span>✗</span>
                    <span>فشل</span>
                </button>
            </div>

            <!-- Grid Layout - Stats & Modes -->
            <div class="grid-layout">
                <!-- Stats Section -->
                <div class="stats-card">
                    <div class="stat-item">
                        <span class="stat-label">السجل</span>
                        <span id="historyCount" class="stat-value">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">الشريط</span>
                        <span id="streakCount" class="stat-value">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">الوقت</span>
                        <span id="timeDisplay" class="stat-value">--:--</span>
                    </div>
                </div>

                <!-- Modes Section -->
                <div class="modes-card">
                    <button id="emergencyBtn" class="btn btn-mode btn-emergency">
                        🛡️ وضع الطوارئ
                    </button>
                </div>
            </div>

            <!-- Reset Button -->
            <div class="footer-action">
                <button id="resetBtn" class="btn btn-reset">
                    إعادة تعيين البيانات
                </button>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>النظام يقرر. المستخدم ينفذ. بدون تفاوض مع التشتت.</p>
        </footer>
    </div>

    <script src="engine.js"></script>
    <script src="app.js"></script>
</body>
</html>
